version: "3.9"

services:
  neuralkali-agent:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: neuralkali-agent
    environment:
      OLLAMA_HOST: http://ollama:11434
      AI_MODEL: ${AI_MODEL:-mistral}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      - reports_data:/opt/neuralkali/reports
      - tasks_data:/opt/neuralkali/tasks
      - ../config:/opt/neuralkali/config
    networks:
      - neuralkali-net
    depends_on:
      - ollama
    deploy:
      resources:
        limits:
          cpus: "4.0"
          memory: 8G

  ollama:
    image: ollama/ollama:latest
    container_name: neuralkali-ollama
    environment:
      OLLAMA_HOST: 0.0.0.0:11434
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
      - reports_data:/opt/neuralkali/reports
      - tasks_data:/opt/neuralkali/tasks
    networks:
      - neuralkali-net
    deploy:
      resources:
        limits:
          cpus: "4.0"
          memory: 8G

networks:
  neuralkali-net:
    driver: bridge

volumes:
  ollama_data:
  reports_data:
  tasks_data:
